# goreleaser v2 — https://goreleaser.com/customization/
# Snapshot: goreleaser release --snapshot --clean --skip=publish
# Validate: goreleaser check
version: 2

project_name: lightsailctl

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: lightsailctl
    main: ./main.go
    binary: lightsailctl
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/aws/lightsailctl/internal.versionString=v{{.Version}}
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files: [LICENSE, NOTICE, README.md]
    formats: ["tar.gz"]
    format_overrides:
      - goos: windows
        formats: ["zip"]

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  draft: true
  prerelease: auto
